<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกคะแนน - Multi Step</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .step { display: none; } 
        .step.active { display: block; }
        
        /* สไตล์ส่วนหัวของแต่ละหน้า */
        .info-header { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #1565c0; line-height: 1.6; }
        
        h2 { color: #333; font-size: 1.2rem; margin-bottom: 20px; border-left: 5px solid #1a73e8; padding-left: 10px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-next { background: #1a73e8; color: white; }
        .btn-prev { background: #eee; color: #666; }
        .btn-save { background: #28a745; color: white; }
        
        /* สไตล์ตาราง/รายการในหน้าท้ายๆ */
        .preview-box { border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fafafa; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="step1" class="step active">
        <h2>หน้า 1: เลือกรายวิชา</h2>
        <label>รายวิชา:</label>
        <select id="course" onchange="updateSummary()">
            <option value="">-- เลือกวิชา --</option>
            <option value="ทฤษฎีทางศัลยศาสตร์ 1">ทฤษฎีทางศัลยศาสตร์ 1</option>
            <option value="ศัลยศาสตร์ปฏิบัติ">ศัลยศาสตร์ปฏิบัติ</option>
        </select>
        <button class="btn-next" onclick="nextStep(2)">ถัดไป</button>
    </div>

    <div id="step2" class="step">
        <div id="info2" class="info-header"></div>
        <h2>หน้า 2: เลือกกลุ่ม</h2>
        <label>กลุ่ม:</label>
        <input type="text" id="group" placeholder="เช่น 2(4)" oninput="updateSummary()">
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(1)">ย้อนกลับ</button>
            <button class="btn-next" onclick="nextStep(3)">ถัดไป</button>
        </div>
    </div>

    <div id="step3" class="step">
        <div id="info3" class="info-header"></div>
        <h2>หน้า 3: ข้อมูลนิสิต</h2>
        <label>รหัสนิสิต:</label>
        <input type="number" id="studentId" placeholder="64xxxxxx" oninput="updateSummary()">
        <label>ชื่อ-นามสกุล:</label>
        <input type="text" id="studentName" placeholder="นาย/นางสาว..." oninput="updateSummary()">
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(2)">ย้อนกลับ</button>
            <button class="btn-next" onclick="nextStep(4)">ถัดไป</button>
        </div>
    </div>

    <div id="step4" class="step">
        <div id="info4" class="info-header"></div>
        <h2>หน้า 4: เกณฑ์คะแนนรายข้อ</h2>
        <div id="criteriaList" class="preview-box">
            กำลังโหลดเกณฑ์คะแนน...
        </div>
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(3)">ย้อนกลับ</button>
            <button class="btn-next" onclick="nextStep(5)">ถัดไป</button>
        </div>
    </div>

    <div id="step5" class="step">
        <div id="info5" class="info-header"></div>
        <h2>หน้า 5: น้ำหนักคะแนนหมวดใหญ่</h2>
        <div id="weightList" class="preview-box"></div>
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(4)">ย้อนกลับ</button>
            <button class="btn-next" onclick="nextStep(6)">ถัดไป</button>
        </div>
    </div>

    <div id="step6" class="step">
        <div id="info6" class="info-header"></div>
        <h2>หน้า 6: ตั้งค่าอันตรรภาคชั้น</h2>
        <label>ค่าอันตรรภาคชั้น (Interval):</label>
        <input type="number" id="interval" value="3.5" step="0.1">
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(5)">ย้อนกลับ</button>
            <button class="btn-next" onclick="nextStep(7)">ถัดไป</button>
        </div>
    </div>

    <div id="step7" class="step">
        <div id="info7" class="info-header"></div>
        <h2>หน้า 7: ช่วงวันที่ประเมิน</h2>
        <label>วันที่เริ่ม:</label>
        <input type="date" id="startDate">
        <label>วันที่สิ้นสุด:</label>
        <input type="date" id="endDate">
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(6)">ย้อนกลับ</button>
            <button class="btn-next" onclick="nextStep(8)">ถัดไป</button>
        </div>
    </div>

    <div id="step8" class="step">
        <div id="info8" class="info-header"></div>
        <h2>หน้า 8: งานและอาจารย์ผู้ประเมิน</h2>
        <label>กลุ่มงาน:</label>
        <input type="text" id="dept" placeholder="เช่น ศัลยกรรม">
        <label>อาจารย์ผู้ประเมิน:</label>
        <input type="text" id="teacher" placeholder="ชื่ออาจารย์">
        
        <hr>
        <h3 style="font-size:14px; color:red;">ตรวจสอบข้อมูลให้ครบถ้วนก่อนบันทึก</h3>
        
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(7)">ย้อนกลับ</button>
            <button class="btn-save" onclick="submitData()">💾 บันทึกคะแนน</button>
        </div>
    </div>

</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzq9lY014xqSuD0uxUSrXWEebatzwkxpRrZVwScTSAJVbAVeC0zc6jvxV7ytgjv4TNY/exec";
    let currentCriteria = [];

    // ฟังก์ชันเปลี่ยนหน้า
    function nextStep(step) {
        // เช็คความเรียบร้อยก่อนไปหน้าถัดไป (ตัวอย่าง)
        if(step === 2 && !document.getElementById('course').value) return alert('กรุณาเลือกวิชา');
        if(step === 4) loadCriteria(); // โหลดเกณฑ์มาโชว์ในหน้า 4
        
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        updateSummary();
    }

    function prevStep(step) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
    }

    // อัปเดตแถบข้อมูลด้านบนในทุกๆ หน้า เพื่อเชื่อมโยงข้อมูล
    function updateSummary() {
        const course = document.getElementById('course').value;
        const group = document.getElementById('group').value;
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        
        const summaryText = `
            <b>วิชา:</b> ${course || '-'} | <b>กลุ่ม:</b> ${group || '-'}<br>
            <b>นิสิต:</b> ${id} ${name}
        `;
        
        for(let i=2; i<=8; i++) {
            const el = document.getElementById('info' + i);
            if(el) el.innerHTML = summaryText;
        }
    }

    // โหลดเกณฑ์มาจาก Sheet (เชื่อม รายวิชา -> เกณฑ์)
    async function loadCriteria() {
        const course = document.getElementById('course').value;
        const res = await fetch(`${API_URL}?action=getCriteria&course=${encodeURIComponent(course)}`);
        currentCriteria = await res.json();
        
        let html = "";
        let weightHtml = "";
        let seenCats = {};

        currentCriteria.forEach(c => {
            // หน้า 4: แสดงหัวข้อหลัก/ย่อย
            if(Number(c.max) === 0) {
                html += `<div style="background:#eee; padding:5px; margin-top:10px; font-weight:bold;">📍 ${c.label}</div>`;
            } else {
                html += `<div style="padding-left:15px; border-bottom:1px solid #f0f0f0;">- ${c.label} (Max: ${c.max}, MPL: ${c.mpl}%)</div>`;
            }

            // หน้า 5: แสดงน้ำหนักหมวด (%)
            if(!seenCats[c.category]) {
                weightHtml += `<div><b>หมวด ${c.category}:</b> น้ำหนัก ${c.weight}%</div>`;
                seenCats[c.category] = true;
            }
        });
        
        document.getElementById('criteriaList').innerHTML = html || "ไม่พบเกณฑ์คะแนน";
        document.getElementById('weightList').innerHTML = weightHtml || "ไม่พบข้อมูลน้ำหนักคะแนน";
    }

    async function submitData() {
        const btn = document.querySelector('.btn-save');
        btn.disabled = true;
        btn.innerText = "⏳ กำลังบันทึก...";
        
        // รวบรวมข้อมูลทั้งหมดส่งไปบันทึก
        const payload = {
            action: 'saveData',
            course: document.getElementById('course').value,
            group: document.getElementById('group').value,
            studentId: document.getElementById('studentId').value,
            studentName: document.getElementById('studentName').value,
            interval: document.getElementById('interval').value,
            startDate: document.getElementById('startDate').value,
            endDate: document.getElementById('endDate').value,
            dept: document.getElementById('dept').value,
            teacher: document.getElementById('teacher').value
        };

        // ในขั้นตอนสุดท้าย คุณจะส่งคะแนนรายข้อไปด้วย (Logic เดียวกับเวอร์ชันก่อน)
        // ... (เพิ่มการเก็บคะแนนจาก Input ในหน้า 4 หรือเพิ่มช่องกรอกในหน้าสุดท้าย)

        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
        location.reload();
    }
</script>
</body>
</html>
