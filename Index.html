<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินผลคะแนน</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .step { display: none; } .active { display: block; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; color: #333; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .btn-next { background: #1a73e8; color: white; margin-top: 15px; padding: 12px; }
        .btn-save { background: #28a745; color: white; margin-top: 15px; padding: 12px; }
        .btn-add-cat { background: #6c757d; color: white; margin-top: 15px; }
        
        /* สไตล์หน้าตั้งค่า */
        .settings-panel { display: none; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #fafafa; }
        .category-box { border: 2px dashed #b0bec5; padding: 12px; margin-top: 15px; border-radius: 8px; background: #fff; }
        .category-header { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; background: #e3f2fd; padding: 10px; border-radius: 6px; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 5px; margin-bottom: 5px; align-items: center; }
        .divider-row { display: grid; grid-template-columns: 1fr 40px; gap: 5px; margin-bottom: 5px; align-items: center; }
        
        /* สไตล์ฟอร์มคะแนน */
        .scoring-cat-box { border: 1px solid #e0e0e0; padding: 15px; margin-top: 15px; border-radius: 8px; background: #fdfdfd; }
        .scoring-cat-title { font-size: 16px; font-weight: bold; color: #1565c0; margin-bottom: 10px; border-bottom: 2px solid #1565c0; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="margin:0; color:#333;">📝 ระบบบันทึกคะแนน</h3>
        <span style="cursor:pointer; font-size:22px;" onclick="toggleSettings()" title="ตั้งค่าเกณฑ์">⚙️</span>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <h4 style="margin-top:0;">⚙️ ตั้งค่าหมวดหมู่และเกณฑ์</h4>
        <label>เลือกวิชาที่จะตั้งค่า:</label>
        <select id="settingCourse" onchange="loadCriteriaForSetting()"></select>
        
        <div id="categoriesContainer"></div>
        
        <button onclick="addCategory()" class="btn-add-cat">➕ เพิ่มหมวดใหญ่ (เช่น MEQ, MCQ)</button>
        <button onclick="saveCriteriaToSheet()" class="btn-save">💾 บันทึกเกณฑ์วิชานี้</button>
    </div>

    <div id="step1" class="step active">
        <label>1. รายวิชา:</label>
        <select id="mainCourse" onchange="loadCriteriaForScoring()"></select>
        
        <div style="display: flex; gap: 10px;">
            <div style="flex:1;"><label>กลุ่ม:</label><input type="text" id="group" placeholder="เช่น 2(4)"></div>
            <div style="flex:2;"><label>รหัสนิสิต:</label><input type="number" id="studentId" placeholder="กรอกรหัส"></div>
        </div>
        
        <label>ชื่อ-นามสกุล:</label>
        <input type="text" id="studentName">
        
        <button class="btn-next" onclick="goStep2()">ถัดไป ➔</button>
    </div>

    <div id="step2" class="step">
        <label>ชื่ออาจารย์ผู้ประเมิน:</label>
        <input type="text" id="evaluator" placeholder="ชื่อ-สกุล">
        
        <div id="scoringContainer"></div> 
        
        <button class="btn-save" id="submitBtn" onclick="submitFinalData()">💾 บันทึกคะแนนเข้าระบบ</button>
        <button onclick="goStep1()" style="background:none; color:#666; width:100%; padding:10px; border:none; cursor:pointer; font-weight:bold;">⬅ ย้อนกลับ</button>
    </div>
</div>

<script>
    // 📍 เอา URL ของคุณมาวางตรงนี้ครับ!
    const API_URL = "https://script.google.com/macros/s/AKfycbzq9lY014xqSuD0uxUSrXWEebatzwkxpRrZVwScTSAJVbAVeC0zc6jvxV7ytgjv4TNY/exec";
    
    let criteriaState = []; 

    document.addEventListener("DOMContentLoaded", loadCourses);

    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    async function loadCourses() {
        const res = await fetch(API_URL + "?action=getCourses");
        const courses = await res.json();
        const sels = [document.getElementById('mainCourse'), document.getElementById('settingCourse')];
        sels.forEach(sel => {
            sel.innerHTML = '<option value="">-- เลือกวิชา --</option>';
            courses.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        });
    }

    function addCategory(catName = '', weight = 0) {
        const catId = Date.now() + Math.floor(Math.random()*1000);
        const div = document.createElement('div');
        div.className = 'category-box';
        div.id = `cat-${catId}`;
        div.innerHTML = `
            <div class="category-header">
                <input type="text" class="cat-name" placeholder="ชื่อหมวดใหญ่ (เช่น MEQ)" value="${catName}" style="flex:2; margin:0; font-weight:bold;">
                <input type="number" class="cat-weight" placeholder="น้ำหนัก %" value="${weight}" style="flex:1; margin:0;">
                <span style="font-weight:bold;">%</span>
                <button onclick="document.getElementById('cat-${catId}').remove()" style="margin:0; background:none; color:red; width:auto; padding:5px;">🗑️</button>
            </div>
            
            <div class="items-container"></div>
            
            <div style="display: flex; gap: 5px; margin-top: 10px; background: #f8f9fa; padding: 10px; border-radius: 6px;">
                <button onclick="addItem(this.parentElement.previousElementSibling, false)" style="background:#007bff; color:white;">+ เพิ่มข้อสอบ (มีคะแนน)</button>
                <button onclick="addItem(this.parentElement.previousElementSibling, true)" style="background:#6c757d; color:white;">+ เพิ่มป้ายคั่น</button>
            </div>
        `;
        document.getElementById('categoriesContainer').appendChild(div);
        return div.querySelector('.items-container'); 
    }

    // ฟังก์ชันนี้ถูกปรับให้แยกแยะระหว่าง "ข้อสอบ" กับ "ป้ายคั่น" ชัดเจน
    function addItem(container, isDivider = false, label = '', max = 10, mpl = 60) {
        const div = document.createElement('div');
        
        if (isDivider || Number(max) === 0) {
            // โหมด: ป้ายคั่น (ซ่อนช่อง Max/MPL)
            div.className = 'divider-row';
            div.innerHTML = `
                <div style="display:flex; align-items:center; background:#e9ecef; border-radius:4px;">
                    <span style="padding:0 10px; font-weight:bold; color:#555;">📍 ป้ายคั่น:</span>
                    <input type="text" class="i-label" value="${label}" placeholder="เช่น ส่วนที่ 1 General" style="margin:0; border:none; background:transparent; flex:1; font-weight:bold;">
                </div>
                <input type="hidden" class="i-max" value="0">
                <input type="hidden" class="i-mpl" value="0">
                <button onclick="this.parentElement.remove()" style="margin:0; background:#ff4d4d; color:white; padding:10px 0;">✕</button>
            `;
        } else {
            // โหมด: ข้อสอบปกติ (แสดงช่อง Max/MPL)
            div.className = 'item-row';
            div.innerHTML = `
                <input type="text" class="i-label" value="${label}" placeholder="ชื่อข้อสอบ (เช่น ข้อ 1)">
                <div><small style="color:#666;">เต็ม</small><input type="number" class="i-max" value="${max}" style="margin-top:0;"></div>
                <div><small style="color:#666;">MPL%</small><input type="number" class="i-mpl" value="${mpl}" style="margin-top:0;"></div>
                <button onclick="this.parentElement.remove()" style="margin:0; background:#ff4d4d; color:white; padding:10px 0; align-self:end;">✕</button>
            `;
        }
        container.appendChild(div);
    }

    async function loadCriteriaForSetting() {
        const course = document.getElementById('settingCourse').value;
        document.getElementById('categoriesContainer').innerHTML = '';
        if(!course) return;
        
        const res = await fetch(`${API_URL}?action=getCriteria&course=${encodeURIComponent(course)}`);
        const data = await res.json();
        
        const grouped = {};
        data.forEach(d => {
            if(!grouped[d.category]) grouped[d.category] = { weight: d.weight, items: [] };
            grouped[d.category].items.push(d);
        });

        for (const cat in grouped) {
            const container = addCategory(cat, grouped[cat].weight);
            // โหลดข้อมูลเก่า: ถ้า Max เป็น 0 ให้วาดเป็น ป้ายคั่น (true)
            grouped[cat].items.forEach(item => addItem(container, Number(item.max) === 0, item.label, item.max, item.mpl));
        }
    }

    async function saveCriteriaToSheet() {
        const course = document.getElementById('settingCourse').value;
        if(!course) return alert('เลือกวิชาก่อนครับ');
        
        const criteria = [];
        document.querySelectorAll('.category-box').forEach(catBox => {
            const catName = catBox.querySelector('.cat-name').value;
            const weight = catBox.querySelector('.cat-weight').value;
            
            // ดึงทั้งข้อสอบและป้ายคั่น
            catBox.querySelectorAll('.item-row, .divider-row').forEach(row => {
                criteria.push({
                    category: catName, 
                    weight: weight,
                    label: row.querySelector('.i-label').value,
                    max: row.querySelector('.i-max').value,
                    mpl: row.querySelector('.i-mpl').value
                });
            });
        });

        document.querySelector('#settingsPanel .btn-save').innerText = '⏳ กำลังบันทึก...';
        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'saveCriteria', course, criteria })
        });
        alert('บันทึกเกณฑ์เรียบร้อย!');
        document.querySelector('#settingsPanel .btn-save').innerText = '💾 บันทึกเกณฑ์วิชานี้';
    }

    // ==========================================
    // ส่วนที่ 2: ระบบให้คะแนน (User)
    // ==========================================
    async function loadCriteriaForScoring() {
        const course = document.getElementById('mainCourse').value;
        if(!course) return;
        
        const res = await fetch(`${API_URL}?action=getCriteria&course=${encodeURIComponent(course)}`);
        criteriaState = await res.json();
        
        const grouped = {};
        criteriaState.forEach((d, i) => {
            d.originalIndex = i; 
            if(!grouped[d.category]) grouped[d.category] = { weight: d.weight, items: [] };
            grouped[d.category].items.push(d);
        });

        const container = document.getElementById('scoringContainer');
        container.innerHTML = '';
        
        for (const cat in grouped) {
            let html = `<div class="scoring-cat-box">
                            <div class="scoring-cat-title">📁 หมวด: ${cat} (น้ำหนัก ${grouped[cat].weight}%)</div>`;
            
            grouped[cat].items.forEach(c => {
                if (Number(c.max) === 0) {
                    // แสดงเป็นป้ายคั่น
                    html += `<div style="font-weight:bold; color:#444; margin-top:20px; margin-bottom:5px; padding:8px; background:#e9ecef; border-radius:4px; font-size:15px; border-left:4px solid #6c757d;">
                                ${c.label}
                             </div>`;
                } else {
                    // แสดงเป็นช่องกรอกคะแนน
                    const passScore = (c.max * c.mpl) / 100;
                    html += `<label style="margin-left:15px; display:block;">${c.label} <span style="color:#888; font-size:12px; font-weight:normal;">(เต็ม ${c.max} | ผ่าน ${passScore})</span></label>
                             <input type="number" class="student-score" data-index="${c.originalIndex}" max="${c.max}" placeholder="ใส่คะแนน" style="margin-left:15px; width:calc(100% - 15px); margin-bottom:10px;">`;
                }
            });
            html += `</div>`;
            container.innerHTML += html;
        }
    }

    function goStep2() {
        if(!document.getElementById('studentId').value || !document.getElementById('mainCourse').value) {
            return alert('กรุณาเลือกวิชาและกรอกรหัสนิสิตให้ครบถ้วน');
        }
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function goStep1() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
    }

    async function submitFinalData() {
        const btn = document.getElementById('submitBtn');
        const scores = [];
        
        document.querySelectorAll('.student-score').forEach(input => {
            const idx = input.dataset.index;
            scores.push({
                category: criteriaState[idx].category,
                label: criteriaState[idx].label,
                max: criteriaState[idx].max,
                value: input.value || 0
            });
        });

        const payload = {
            action: 'saveData',
            course: document.getElementById('mainCourse').value,
            group: document.getElementById('group').value,
            studentId: document.getElementById('studentId').value,
            studentName: document.getElementById('studentName').value,
            evaluator: document.getElementById('evaluator').value,
            scores: scores
        };

        btn.disabled = true; btn.innerText = "⏳ กำลังบันทึกข้อมูล...";
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert('บันทึกคะแนนเข้าระบบเรียบร้อย!');
        location.reload(); 
    }
</script>
</body>
</html>
