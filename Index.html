<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Sarabun', sans-serif; 
      background-color: #f0f4f8; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
    }
    .container { 
      background: #ffffff; 
      padding: 40px; 
      border-radius: 12px; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
      text-align: center; 
      max-width: 400px; 
      width: 90%; 
    }
    h2 { color: #2c3e50; margin-bottom: 5px; }
    p { color: #7f8c8d; margin-bottom: 25px;}
    .btn { 
      background-color: #3498db; 
      color: white; 
      border: none; 
      padding: 12px 20px; 
      font-size: 16px; 
      border-radius: 6px; 
      cursor: pointer; 
      width: 100%; 
      font-family: 'Sarabun', sans-serif;
      transition: 0.3s;
    }
    .btn:hover { background-color: #2980b9; }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135810.png" width="80" alt="icon" style="margin-bottom: 15px;">
    
    <h2>ระบบกรอกคะแนนเพื่อทำเกรด</h2>
    <p>รายวิชา ทฤษฎีทางศัลยศาสตร์ 1</p>
    
    <button class="btn" onclick="alert('เยี่ยมมาก! คุณทำหน้าแรกสำเร็จแล้ว เดี๋ยวเราไปทำหน้ากรอกคะแนนกันต่อครับ')">เข้าสู่ระบบกรอกคะแนน</button>
  </div>

</body>
</html>
