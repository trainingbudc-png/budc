<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกคะแนน</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .step { display: none; } 
        .step.active { display: block; }
        h2 { color: #1a73e8; border-left: 5px solid #1a73e8; padding-left: 10px; margin-bottom: 20px; font-size: 1.2rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-next { background: #1a73e8; color: white; }
        .btn-prev { background: #666; color: white; }
        .btn-save { background: #28a745; color: white; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div id="step1" class="step active">
        <h2>1. ข้อมูลรายวิชา</h2>
        <label>รายวิชา:</label>
        <select id="course"><option value="">-- กำลังโหลด... --</option></select>
        <label>กลุ่ม:</label>
        <input type="text" id="group" placeholder="เช่น 1 หรือ 2(4)">
        <button class="btn-next" onclick="nextStep(2)">ถัดไป</button>
    </div>
    <div id="step2" class="step">
        <h2>2. ข้อมูลนิสิต</h2>
        <label>รหัสนิสิต:</label>
        <input type="number" id="studentId" placeholder="64xxxxxx">
        <label>ชื่อ-นามสกุล:</label>
        <input type="text" id="studentName" placeholder="ชื่อ-นามสกุล">
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(1)">ย้อนกลับ</button>
            <button class="btn-next" onclick="nextStep(3)">ถัดไป</button>
        </div>
    </div>
    <div id="step3" class="step">
        <h2>3. บันทึกคะแนน</h2>
        <div id="criteriaList">กำลังโหลดเกณฑ์คะแนน...</div>
        <label style="margin-top:15px;">อาจารย์ผู้ประเมิน:</label>
        <input type="text" id="teacher">
        <div class="btn-group">
            <button class="btn-prev" onclick="prevStep(2)">ย้อนกลับ</button>
            <button class="btn-save" id="saveBtn" onclick="submitData()">💾 บันทึกข้อมูล</button>
        </div>
        <button class="btn-prev" style="width:100%; margin-top:10px; background:#dc3545;" onclick="location.reload()">เริ่มใหม่</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyGJZSFcQXxIx4aIxi3rDaQULSE3Tm43tlVHiIyuMep07oK7REfYIAIVc18Fbbo5rRH/exec"; // 🚩 เปลี่ยน URL ตรงนี้
    function nextStep(s) {
        if(s === 2 && !document.getElementById('course').value) return alert('เลือกวิชาก่อนครับ');
        if(s === 3) loadCriteria();
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }
    function prevStep(s) {
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }
    async function loadCourses() {
        const res = await fetch(`${API_URL}?action=getCourses`);
        const courses = await res.json();
        const sel = document.getElementById('course');
        sel.innerHTML = '<option value="">-- เลือกวิชา --</option>' + courses.map(c => `<option value="${c}">${c}</option>`).join('');
    }
    async function loadCriteria() {
        const course = document.getElementById('course').value;
        document.getElementById('criteriaList').innerHTML = "⏳ โหลดเกณฑ์...";
        const res = await fetch(`${API_URL}?action=getCriteria&course=${encodeURIComponent(course)}`);
        const data = await res.json();
        let html = "";
        data.forEach((c, i) => {
            if(Number(c.max) === 0) {
                html += `<div style="background:#eee; padding:5px; margin-top:10px; font-weight:bold;">📍 ${c.label}</div>`;
            } else {
                html += `<div style="margin-bottom:10px;"><label>${c.label} (เต็ม ${c.max})</label>
                         <input type="number" class="score-input" data-topic="${c.category}_${c.label}_${i+1}" max="${c.max}"></div>`;
            }
        });
        document.getElementById('criteriaList').innerHTML = html;
    }
    async function submitData() {
        document.getElementById('saveBtn').disabled = true;
        let scores = {};
        document.querySelectorAll('.score-input').forEach(i => scores[i.getAttribute('data-topic')] = i.value || "0");
        const payload = {
            action: 'saveScore', rowId: null,
            course: document.getElementById('course').value, group: document.getElementById('group').value,
            studentId: document.getElementById('studentId').value, studentName: document.getElementById('studentName').value,
            teacher: document.getElementById('teacher').value, scores: scores
        };
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert('✅ บันทึกข้อมูลสำเร็จ!');
        location.reload();
    }
    window.onload = loadCourses;
</script>
</body>
</html>
