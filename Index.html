<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินผลคะแนน</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .step { display: none; } .active { display: block; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-next { background: #1a73e8; color: white; }
        .btn-save { background: #28a745; color: white; }
        .settings-panel { display: none; border: 1px solid #ccc; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fff; }
        .criteria-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="margin:0;">📝 ระบบบันทึกคะแนน</h3>
        <span style="cursor:pointer; font-size:20px;" onclick="toggleSettings()">⚙️</span>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <h4>ตั้งค่าเกณฑ์คะแนน</h4>
        <label>เลือกวิชาที่จะตั้งเกณฑ์:</label>
        <select id="settingCourse" onchange="loadCriteriaForSetting()"></select>
        
        <div id="criteriaList" style="margin-top:10px;">
            <div class="criteria-row" style="font-size:11px; font-weight:bold;">
                <div>ชื่อหัวข้อ</div><div>Max</div><div>MPL%</div><div></div>
            </div>
            </div>
        <button onclick="addCriteriaRow()" style="background:#eee; color:#333; padding:5px;">+ เพิ่มหัวข้อ</button>
        <button onclick="saveCriteriaToSheet()" class="btn-save">💾 บันทึกเกณฑ์คะแนน</button>
    </div>

    <div id="step1" class="step active">
        <label>วิชา:</label>
        <select id="mainCourse" onchange="loadCriteriaForScoring()"></select>
        <label>กลุ่มเรียน:</label>
        <input type="text" id="group">
        <label>รหัสนิสิต:</label>
        <input type="number" id="studentId">
        <label>ชื่อ-นามสกุล:</label>
        <input type="text" id="studentName">
        <button class="btn-next" onclick="goStep2()">ถัดไป ➔</button>
    </div>

    <div id="step2" class="step">
        <label>ชื่ออาจารย์ผู้ประเมิน:</label>
        <input type="text" id="evaluator">
        <hr>
        <div id="scoreInputsContainer"></div>
        <button class="btn-save" id="submitBtn" onclick="submitFinalData()">💾 บันทึกคะแนน</button>
        <button onclick="goStep1()" style="background:none; color:gray;">⬅ ย้อนกลับ</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzq9lY014xqSuD0uxUSrXWEebatzwkxpRrZVwScTSAJVbAVeC0zc6jvxV7ytgjv4TNY/exec";
    let currentCriteria = [];

    document.addEventListener("DOMContentLoaded", loadCourses);

    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    async function loadCourses() {
        const res = await fetch(API_URL + "?action=getCourses");
        const courses = await res.json();
        const sels = [document.getElementById('mainCourse'), document.getElementById('settingCourse')];
        sels.forEach(sel => {
            sel.innerHTML = '<option value="">-- เลือกวิชา --</option>';
            courses.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        });
    }

    // --- ระบบจัดการเกณฑ์คะแนน ---
    function addCriteriaRow(label = '', max = 50, mpl = 35) {
        const div = document.createElement('div');
        div.className = 'criteria-row';
        div.innerHTML = `
            <input type="text" class="c-label" value="${label}" placeholder="หัวข้อ">
            <input type="number" class="c-max" value="${max}">
            <input type="number" class="c-mpl" value="${mpl}">
            <button onclick="this.parentElement.remove()" style="margin:0; background:red; color:white; padding:0;">✕</button>
        `;
        document.getElementById('criteriaList').appendChild(div);
    }

    async function loadCriteriaForSetting() {
        const course = document.getElementById('settingCourse').value;
        if(!course) return;
        const res = await fetch(`${API_URL}?action=getCriteria&course=${encodeURIComponent(course)}`);
        const data = await res.json();
        document.getElementById('criteriaList').innerHTML = '';
        if(data.length > 0) data.forEach(c => addCriteriaRow(c.label, c.max, c.mpl));
        else addCriteriaRow();
    }

    async function saveCriteriaToSheet() {
        const course = document.getElementById('settingCourse').value;
        const rows = document.querySelectorAll('.criteria-row');
        const criteria = [];
        rows.forEach((row, i) => {
            if(i === 0) return; // skip header
            criteria.push({
                label: row.querySelector('.c-label').value,
                max: row.querySelector('.c-max').value,
                mpl: row.querySelector('.c-mpl').value
            });
        });
        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'saveCriteria', course, criteria })
        });
        alert('บันทึกเกณฑ์เรียบร้อย!');
    }

    // --- ระบบให้คะแนน ---
    async function loadCriteriaForScoring() {
        const course = document.getElementById('mainCourse').value;
        const res = await fetch(`${API_URL}?action=getCriteria&course=${encodeURIComponent(course)}`);
        currentCriteria = await res.json();
        const container = document.getElementById('scoreInputsContainer');
        container.innerHTML = '';
        currentCriteria.forEach((c, i) => {
            container.innerHTML += `
                <label>${c.label} (เต็ม ${c.max}, ผ่านที่ ${Math.round(c.max * c.mpl/100)})</label>
                <input type="number" class="student-score" data-index="${i}" max="${c.max}" placeholder="ใส่คะแนน 0-${c.max}">
            `;
        });
    }

    function goStep2() {
        if(!currentCriteria.length) return alert('กรุณาเลือกวิชาที่มีการตั้งเกณฑ์ไว้แล้ว');
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function goStep1() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
    }

    async function submitFinalData() {
        const btn = document.getElementById('submitBtn');
        const scores = [];
        document.querySelectorAll('.student-score').forEach(input => {
            const idx = input.dataset.index;
            scores.push({
                label: currentCriteria[idx].label,
                max: currentCriteria[idx].max,
                value: input.value
            });
        });

        const payload = {
            action: 'saveData',
            course: document.getElementById('mainCourse').value,
            group: document.getElementById('group').value,
            studentId: document.getElementById('studentId').value,
            studentName: document.getElementById('studentName').value,
            evaluator: document.getElementById('evaluator').value,
            scores: scores
        };

        btn.disabled = true; btn.innerText = "⏳ บันทึก...";
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert('บันทึกคะแนนเรียบร้อย!');
        location.reload(); // รีเฟรชเริ่มใหม่
    }
</script>
</body>
</html>
