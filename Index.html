<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); position: relative; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; margin-bottom: 20px; }
    .settings-icon { font-size: 24px; cursor: pointer; }
    .step { display: none; }
    .step.active { display: block; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .btn-submit { background-color: #34a853; color: white; width: 100%; margin-top: 20px; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
    .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
    .modal-content { background-color: white; margin: 15% auto; padding: 20px; border-radius: 10px; width: 300px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>ระบบบันทึกคะแนน</h2>
    <span onclick="openSettings()">⚙️</span>
  </div>
  
  <div class="step active" id="step1">
    <label>รายวิชา:</label>
    <select id="course"><option value="">-- กำลังโหลด... --</option></select>
    <label>รหัสนิสิต:</label>
    <input type="text" id="studentId">
    <button class="btn-submit" onclick="submitTest()">ทดสอบบันทึก</button>
  </div>
</div>

<div id="settingsModal" class="modal">
  <div class="modal-content">
    <h3>จัดการรายวิชา</h3>
    <input type="text" id="newCourse" placeholder="ชื่อวิชา">
    <button onclick="addNewCourse()">เพิ่ม</button>
    <button onclick="closeSettings()">ปิด</button>
    <div id="courseList"></div>
  </div>
</div>

<script>
  // ตัวดัก Error พื้นฐาน
  function handleErr(err) {
    alert("เกิดข้อผิดพลาด: " + err.message);
    console.error(err);
  }

  function loadCourses() {
    google.script.run
      .withSuccessHandler(updateUI)
      .withFailureHandler(handleErr) // ถ้าพังจะแจ้ง Alert
      .getCourses();
  }

  function updateUI(courses) {
    const select = document.getElementById('course');
    select.innerHTML = '<option value="">-- เลือกวิชา --</option>';
    courses.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
    document.getElementById('courseList').innerHTML = courses.join('<br>');
  }

  function addNewCourse() {
    const name = document.getElementById('newCourse').value;
    google.script.run
      .withSuccessHandler(loadCourses)
      .withFailureHandler(handleErr)
      .addCourse(name);
  }

  function openSettings() { document.getElementById('settingsModal').style.display = 'block'; loadCourses(); }
  function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

  document.addEventListener("DOMContentLoaded", loadCourses);
</script>
</body>
</html>
