<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ทดสอบ API กับ GitHub</title>
  <style>
    body { font-family: 'Sarabun', sans-serif; padding: 20px; background: #f0f2f5; }
    .box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 0 auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    select, input, button { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
    .btn-add { background: #1a73e8; color: white; border: none; cursor:pointer; font-weight: bold; border-radius: 5px;}
  </style>
</head>
<body>

<div class="box">
  <h2 style="text-align: center; color: #333;">ดึงข้อมูลจาก GitHub</h2>
  
  <label>เลือกวิชา:</label>
  <select id="course">
    <option value="">-- กำลังโหลดข้อมูล... --</option>
  </select>

  <hr style="margin:20px 0;">
  
  <label>เพิ่มวิชาใหม่:</label>
  <input type="text" id="newCourse" placeholder="พิมพ์ชื่อวิชาที่นี่">
  <button class="btn-add" onclick="saveCourse()">➕ เพิ่มรายวิชา</button>
</div>

<script>
  // 📍 เอา URL ยาวๆ ที่ได้จากการ Deploy Apps Script มาวางในเครื่องหมายคำพูดด้านล่างนี้เลยครับ
  const API_URL = "https://script.google.com/macros/s/AKfycbzq9lY014xqSuD0uxUSrXWEebatzwkxpRrZVwScTSAJVbAVeC0zc6jvxV7ytgjv4TNY/exec"; 

  // เมื่อหน้าเว็บโหลดเสร็จ ให้ดึงข้อมูลวิชาทันที
  document.addEventListener("DOMContentLoaded", function() {
    loadCourses();
  });

  function loadCourses() {
    fetch(API_URL + "?action=getCourses")
      .then(response => response.json())
      .then(courses => {
        updateDropdown(courses);
      })
      .catch(error => {
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อ: " + error);
      });
  }

  function saveCourse() {
    const courseName = document.getElementById('newCourse').value;
    if(!courseName) return alert("กรุณาพิมพ์ชื่อวิชาก่อน");

    const inputField = document.getElementById('newCourse');
    inputField.value = "กำลังเพิ่ม...";
    inputField.disabled = true;

    // ยิง API ไปเพิ่มวิชา
    fetch(API_URL + "?action=addCourse&name=" + encodeURIComponent(courseName))
      .then(response => response.json())
      .then(courses => {
        updateDropdown(courses);
        inputField.value = "";
        inputField.disabled = false;
        alert("เพิ่มรายวิชาสำเร็จ!");
      })
      .catch(error => {
        alert("บันทึกไม่สำเร็จ: " + error);
        inputField.disabled = false;
      });
  }

  function updateDropdown(courses) {
    const select = document.getElementById('course');
    select.innerHTML = '<option value="">-- กรุณาเลือกรายวิชา --</option>';
    if(courses.length === 0) {
      select.innerHTML += '<option value="">(ยังไม่มีวิชาในระบบ)</option>';
    }
    courses.forEach(c => {
      select.innerHTML += `<option value="${c}">${c}</option>`;
    });
  }
</script>

</body>
</html>
