<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .step { display: none; }
    .step.active { display: block; }
    h2 { color: #1a73e8; text-align: center; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
    label { font-weight: bold; display: block; margin-top: 15px; }
    input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .btn-group { display: flex; justify-content: space-between; margin-top: 25px; }
    button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
    .btn-next { background-color: #1a73e8; color: white; }
    .btn-prev { background-color: #e0e0e0; color: #333; }
    .btn-submit { background-color: #34a853; color: white; width: 100%; margin-top: 20px;}
    #message { text-align: center; margin-top: 15px; font-weight: bold; color: green; }
  </style>
</head>
<body>

<div class="container">
  <h2>ระบบบันทึกคะแนน (เฟส 1)</h2>
  <form id="scoreForm" onsubmit="event.preventDefault(); submitData();">
    
    <div class="step active" id="step1">
      <h3>ส่วนที่ 1: ข้อมูลนิสิต</h3>
      <label>กลุ่ม:</label>
      <input type="number" name="group" required placeholder="ระบุกลุ่ม (เช่น 1, 2)">
      
      <label>รหัสนิสิต:</label>
      <input type="text" name="studentId" required placeholder="ระบุรหัสนิสิต">
      
      <label>ชื่อ-สกุล:</label>
      <input type="text" name="studentName" required placeholder="ระบุชื่อ-สกุล">
      
      <div class="btn-group">
        <div></div>
        <button type="button" class="btn-next" onclick="nextStep(1, 2)">ถัดไป ➔</button>
      </div>
    </div>

    <div class="step" id="step2">
      <h3>ส่วนที่ 2: คะแนน MEQ</h3>
      <label>MEQ Gen 1:</label>
      <input type="number" step="any" name="meq1" required>
      <label>MEQ Gen 2:</label>
      <input type="number" step="any" name="meq2" required>
      <label>MEQ Plastic:</label>
      <input type="number" step="any" name="meq3" required>
      <label>MEQ URO:</label>
      <input type="number" step="any" name="meq4" required>
      
      <div class="btn-group">
        <button type="button" class="btn-prev" onclick="prevStep(2, 1)">⬅ ย้อนกลับ</button>
      </div>
      
      <button type="submit" class="btn-submit" id="submitBtn">💾 บันทึกข้อมูล</button>
    </div>

  </form>
  <div id="message"></div>
</div>

<script>
  function nextStep(current, next) {
    document.getElementById('step' + current).classList.remove('active');
    document.getElementById('step' + next).classList.add('active');
  }

  function prevStep(current, prev) {
    document.getElementById('step' + current).classList.remove('active');
    document.getElementById('step' + prev).classList.add('active');
  }

  function submitData() {
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerText = "กำลังบันทึก...";
    
    const form = document.getElementById('scoreForm');
    
    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('message').innerText = response;
        form.reset(); 
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerText = "💾 บันทึกข้อมูล";
        
        // กลับไปหน้า 1
        setTimeout(function() {
          document.getElementById('step2').classList.remove('active');
          document.getElementById('step1').classList.add('active');
          document.getElementById('message').innerText = "";
        }, 2000);
      })
      .saveData(form);
  }
</script>

</body>
</html>
