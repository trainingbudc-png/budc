<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบกรอกคะแนนเพื่อทำเกรด</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; background: #fff; padding: 30px; margin: auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 25px; font-size: 16px; }
        button:hover { background-color: #45a049; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; color: green; }
    </style>
</head>
<body>

<div class="container">
    <h2>แบบฟอร์มกรอกคะแนน</h2>
    <form id="gradeForm">
        <label for="studentId">รหัสนิสิต</label>
        <input type="text" id="studentId" name="studentId" required>

        <label for="name">ชื่อ - สกุล</label>
        <input type="text" id="name" name="name" required>

        <label for="meq">คะแนน MEQ</label>
        <input type="number" step="0.01" id="meq" name="meq" oninput="calculateTotal()">

        <label for="mcq">คะแนน MCQ</label>
        <input type="number" step="0.01" id="mcq" name="mcq" oninput="calculateTotal()">

        <label for="activeLearning">คะแนน Active Learning</label>
        <input type="number" step="0.01" id="activeLearning" name="activeLearning" oninput="calculateTotal()">

        <label for="affective">จิตพิสัยเข้าห้องเรียน</label>
        <input type="number" step="0.01" id="affective" name="affective" oninput="calculateTotal()">

        <label for="total">รวมคะแนน (คำนวณอัตโนมัติ)</label>
        <input type="number" step="0.01" id="total" name="total" readonly>

        <label for="grade">เกรด</label>
        <input type="text" id="grade" name="grade">

        <button type="submit">บันทึกข้อมูล</button>
    </form>
    <div id="message"></div>
</div>

<script>
    // ฟังก์ชันคำนวณคะแนนรวมอัตโนมัติ
    function calculateTotal() {
        let meq = parseFloat(document.getElementById('meq').value) || 0;
        let mcq = parseFloat(document.getElementById('mcq').value) || 0;
        let al = parseFloat(document.getElementById('activeLearning').value) || 0;
        let aff = parseFloat(document.getElementById('affective').value) || 0;
        document.getElementById('total').value = (meq + mcq + al + aff).toFixed(2);
    }

    document.getElementById("gradeForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        let formData = new FormData(this);
        let messageBox = document.getElementById("message");
        messageBox.style.color = "blue";
        messageBox.innerText = "กำลังบันทึกข้อมูล...";

        // นำ URL ของ Web App จาก Google Apps Script มาใส่ที่นี่
        let webAppUrl = "https://script.google.com/macros/s/AKfycbwEZjD_F3uMPxvJm4H_heznQYrpfzg90rDeozYwGoPY04s_mxV34CMDeAuHulTXkXU/exec"; 

        fetch(webAppUrl, {
            method: "POST",
            body: formData
        })
        .then(response => response.text())
        .then(data => {
            messageBox.style.color = "green";
            messageBox.innerText = "บันทึกข้อมูลสำเร็จแล้ว!";
            document.getElementById("gradeForm").reset(); // ล้างฟอร์ม
        })
        .catch(error => {
            messageBox.style.color = "red";
            messageBox.innerText = "เกิดข้อผิดพลาดในการบันทึกข้อมูล";
            console.error('Error:', error);
        });
    });
</script>

</body>
</html>
