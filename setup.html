<div style="max-width: 800px; margin: 30px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: 'Sarabun', sans-serif;">
    <h2 style="color: #ff9800; border-left: 5px solid #ff9800; padding-left: 10px; margin-bottom: 15px;">📜 จัดการข้อมูลประวัติคะแนนดิบ</h2>
    <button onclick="loadHistoryAdmin()" style="background: #1a73e8; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">🔄 โหลดข้อมูลล่าสุด</button>
    
    <div id="adminHistoryContainer" style="margin-top: 20px; overflow-x: auto;">
        <p style="color: #666;">คลิก "โหลดข้อมูลล่าสุด" เพื่อดูประวัติการกรอกคะแนน</p>
    </div>
</div>

<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; padding:20px; box-sizing:border-box; overflow-y:auto; font-family: 'Sarabun', sans-serif;">
    <div style="background:white; max-width:500px; margin:auto; padding:25px; border-radius:15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);">
        <h3 style="color:#1a73e8; margin-top:0;">✏️ แก้ไขข้อมูลและคะแนน</h3>
        <div id="editFormContent"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeEditModal()" style="flex:1; background:#ccc; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">ยกเลิก</button>
            <button id="btnSaveEdit" onclick="saveEditAdmin()" style="flex:1; background:#28a745; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">💾 บันทึกการแก้ไข</button>
        </div>
    </div>
</div>

<script>
    // 🚩 อย่าลืมเปลี่ยน URL ตรงนี้ให้ตรงกับของคุณด้วยนะครับ!
    const ADMIN_API_URL = "https://script.google.com/macros/s/AKfycbyGJZSFcQXxIx4aIxi3rDaQULSE3Tm43tlVHiIyuMep07oK7REfYIAIVc18Fbbo5rRH/exec"; 
    
    let historyDataAdmin = [];
    let currentRowIdAdmin = null;

    // 1. ดึงประวัติมาสร้างเป็นตาราง
    async function loadHistoryAdmin() {
        const container = document.getElementById('adminHistoryContainer');
        container.innerHTML = "⏳ กำลังดึงข้อมูลประวัติ กรุณารอสักครู่...";
        try {
            const res = await fetch(`${ADMIN_API_URL}?action=getHistory`);
            historyDataAdmin = await res.json();
            
            if(!historyDataAdmin || historyDataAdmin.length === 0) {
                container.innerHTML = "📌 ยังไม่มีข้อมูลประวัติในระบบ";
                return;
            }

            let html = `<table style="width:100%; border-collapse: collapse; font-size: 14px; text-align: left;">
                <tr style="background:#f8f9fa;">
                    <th style="border:1px solid #ddd; padding:10px;">วันที่</th>
                    <th style="border:1px solid #ddd; padding:10px;">รหัสนิสิต / ชื่อ</th>
                    <th style="border:1px solid #ddd; padding:10px;">วิชา / กลุ่ม</th>
                    <th style="border:1px solid #ddd; padding:10px; text-align:center;">จัดการ</th>
                </tr>`;
            
            historyDataAdmin.forEach(item => {
                let dateStr = item.Timestamp ? new Date(item.Timestamp).toLocaleString('th-TH') : "-";
                let name = item["ชื่อ-สกุล"] || item["ชื่อ-นามสกุล"] || "";
                html += `<tr>
                    <td style="border:1px solid #ddd; padding:10px;">${dateStr}</td>
                    <td style="border:1px solid #ddd; padding:10px;"><b>${item["รหัสนิสิต"]}</b><br><small>${name}</small></td>
                    <td style="border:1px solid #ddd; padding:10px;">${item["รายวิชา"]}<br><small>กลุ่ม: ${item["กลุ่ม"]}</small></td>
                    <td style="border:1px solid #ddd; padding:10px; text-align:center;">
                        <button onclick="openEditModal(${item.rowId})" style="background:#ffc107; border:none; padding:6px 12px; border-radius:5px; cursor:pointer; font-weight:bold;">✏️ แก้ไข</button>
                    </td>
                </tr>`;
            });
            html += `</table>`;
            container.innerHTML = html;
        } catch(e) {
            container.innerHTML = "❌ โหลดข้อมูลผิดพลาด (ตรวจสอบ URL Web App)";
        }
    }

    // 2. เปิด Popup หน้าต่างแก้ไข
    function openEditModal(rowId) {
        const item = historyDataAdmin.find(d => d.rowId === rowId);
        if(!item) return;
        currentRowIdAdmin = rowId;

        // แยกข้อมูลพื้นฐานออกจากข้อมูลคะแนน
        const standardKeys = ["Timestamp", "รายวิชา", "กลุ่ม", "รหัสนิสิต", "ชื่อ-สกุล", "ชื่อ-นามสกุล", "อาจารย์ผู้ประเมิน", "rowId"];
        
        let formHtml = `
            <div style="margin-bottom:10px;"><label style="font-weight:bold; font-size:14px;">รหัสนิสิต:</label> <input type="text" id="edit_studentId" value="${item['รหัสนิสิต'] || ''}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;"></div>
            <div style="margin-bottom:10px;"><label style="font-weight:bold; font-size:14px;">ชื่อ-นามสกุล:</label> <input type="text" id="edit_studentName" value="${item['ชื่อ-สกุล'] || item['ชื่อ-นามสกุล'] || ''}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;"></div>
            <div style="margin-bottom:10px;"><label style="font-weight:bold; font-size:14px;">กลุ่ม:</label> <input type="text" id="edit_group" value="${item['กลุ่ม'] || ''}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;"></div>
            <input type="hidden" id="edit_course" value="${item['รายวิชา'] || ''}">
            <input type="hidden" id="edit_teacher" value="${item['อาจารย์ผู้ประเมิน'] || ''}">
            <hr style="border:0; border-top:1px dashed #ccc; margin: 15px 0;">
            <h4 style="margin-bottom:10px; color:#444;">คะแนนรายข้อ</h4>
        `;

        // สร้างช่องกรอกคะแนนตามหัวข้อที่มีในประวัติอัตโนมัติ
        for(let key in item) {
            if(!standardKeys.includes(key) && item[key] !== undefined && item[key] !== "") {
                formHtml += `<div style="margin-bottom:8px;">
                                <label style="font-size:13px; color:#555;">${key}:</label> 
                                <input type="number" class="admin-score-input" data-topic="${key}" value="${item[key]}" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;">
                             </div>`;
            }
        }

        document.getElementById('editFormContent').innerHTML = formHtml;
        document.getElementById('editModal').style.display = 'block';
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    // 3. ส่งข้อมูลกลับไปบันทึกทับบรรทัดเดิม
    async function saveEditAdmin() {
        const btn = document.getElementById('btnSaveEdit');
        btn.disabled = true;
        btn.innerText = "⏳ กำลังบันทึก...";

        let scores = {};
        document.querySelectorAll('.admin-score-input').forEach(input => {
            scores[input.getAttribute('data-topic')] = input.value || "0";
        });

        const payload = {
            action: 'saveScore',
            rowId: currentRowIdAdmin,
            course: document.getElementById('edit_course').value,
            group: document.getElementById('edit_group').value,
            studentId: document.getElementById('edit_studentId').value,
            studentName: document.getElementById('edit_studentName').value,
            teacher: document.getElementById('edit_teacher').value,
            scores: scores
        };

        try {
            await fetch(ADMIN_API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("✅ อัปเดตข้อมูลสำเร็จ!");
            closeEditModal();
            loadHistoryAdmin(); // โหลดข้อมูลใหม่ในตารางทันที
        } catch(e) {
            alert("❌ บันทึกผิดพลาด");
        } finally {
            btn.disabled = false;
            btn.innerText = "💾 บันทึกการแก้ไข";
        }
    }
</script>
