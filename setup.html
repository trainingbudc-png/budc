<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าตั้งค่ารายวิชา (Admin)</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { border-left: 5px solid #1a73e8; padding-left: 10px; color: #333; }
        
        /* สไตล์ตารางตั้งค่าเกณฑ์ (ตามรูปที่ 1) */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 30px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #e3f2fd; text-align: center; font-weight: bold; }
        
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        
        /* สไตล์ฟอร์มข้อมูลทั่วไป (ตามรูปที่ 2) */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        
        .btn-save { background: #28a745; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-add { background: #007bff; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ตั้งค่าเกณฑ์การประเมินรายวิชา</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label>รายวิชา:</label>
            <input type="text" placeholder="เช่น ทฤษฎีทางศัลยศาสตร์ 1">
        </div>
        <div class="form-group">
            <label>กลุ่ม:</label>
            <input type="text" placeholder="เช่น 2(4)">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="20%">หมวดการประเมินหลัก</th>
                <th width="40%">หัวข้อย่อย</th>
                <th width="25%">รายละเอียด (MAX / MPL%)</th>
                <th width="15%">% น้ำหนัก (MPL)</th>
            </tr>
        </thead>
        <tbody id="criteriaBody">
            <tr>
                <td><input type="text" value="MEQ" placeholder="ชื่อหมวด"></td>
                <td>
                    <div style="margin-bottom: 5px;"><input type="text" value="1 (Gen 1)" placeholder="หัวข้อย่อย"></div>
                    <div style="margin-bottom: 5px;"><input type="text" value="2 (Gen 2)" placeholder="หัวข้อย่อย"></div>
                    <button class="btn-add">+ เพิ่มหัวข้อย่อย</button>
                </td>
                <td>
                    <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                        <input type="number" placeholder="MAX (15)">
                        <input type="number" placeholder="MPL% (60)">
                    </div>
                    <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                        <input type="number" placeholder="MAX (15)">
                        <input type="number" placeholder="MPL% (60)">
                    </div>
                </td>
                <td>
                    <input type="number" value="15" placeholder="% น้ำหนัก">
                </td>
            </tr>
            <tr>
                <td><input type="text" value="MCQ" placeholder="ชื่อหมวด"></td>
                <td>
                    <div style="margin-bottom: 5px;"><input type="text" value="ข้อสอบ MCQ" placeholder="หัวข้อย่อย"></div>
                </td>
                <td>
                    <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                        <input type="number" placeholder="MAX (100)">
                        <input type="number" placeholder="MPL% (60)">
                    </div>
                </td>
                <td>
                    <input type="number" value="60" placeholder="% น้ำหนัก">
                </td>
            </tr>
        </tbody>
    </table>
    <button class="btn-add" style="margin-top: -20px; margin-bottom: 20px;">+ เพิ่มหมวดประเมินหลัก</button>

    <h2>ตั้งค่ารายละเอียดอื่นๆ</h2>
    <div class="form-grid">
        <div class="form-group">
            <label>อันตรรภาคชั้น (Interval):</label>
            <input type="number" step="0.1" value="3.5">
        </div>
        <div class="form-group">
            <label>กลุ่มงาน:</label>
            <input type="text" value="ศัลยกรรม">
        </div>
        <div class="form-group">
            <label>วันที่เริ่ม:</label>
            <input type="date">
        </div>
        <div class="form-group">
            <label>วันที่สิ้นสุด:</label>
            <input type="date">
        </div>
    </div>

    <h2>รายนามอาจารย์</h2>
    <div class="form-grid">
        <div class="form-group">
            <label>อาจารย์ผู้ประเมิน:</label>
            <input type="text" placeholder="ชื่ออาจารย์">
        </div>
        <div class="form-group">
            <label>อาจารย์รับผิดชอบรายวิชา:</label>
            <input type="text" placeholder="ชื่ออาจารย์รับผิดชอบ">
        </div>
        <div class="form-group">
            <label>หัวหน้ากลุ่มงาน:</label>
            <input type="text" placeholder="ชื่อหัวหน้า">
        </div>
    </div>

    <button class="btn-save">💾 บันทึกการตั้งค่ารายวิชานี้</button>

</div>

</body>
</html>
