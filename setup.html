<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyGJZSFcQXxIx4aIxi3rDaQULSE3Tm43tlVHiIyuMep07oK7REfYIAIVc18Fbbo5rRH/exec";

// โหลดครั้งเดียวพอ
document.addEventListener("DOMContentLoaded", () => {
    addCategory("MEQ");
    loadCourseList();
});

function addCategory(defaultName = "") {
    const tbody = document.getElementById('criteriaBody');
    const tr = document.createElement('tr');
    
    tr.innerHTML = `
        <td>
            <input type="text" class="cat-name" placeholder="ชื่อหมวด" value="${defaultName}">
            <button class="btn-delete-cat" onclick="removeCategory(this)">🗑️ ลบหมวดนี้</button>
        </td>
        <td>
            <div class="sub-container"></div>
            <button class="btn-add-sub" onclick="addSubTopic(this)">+ เพิ่มหัวข้อย่อย</button>
        </td>
        <td>
            <input type="number" class="cat-weight" placeholder="น้ำหนัก %">
        </td>
    `;
    tbody.appendChild(tr);
    addSubTopicDirectly(tr.querySelector('.sub-container'));
}

function addSubTopic(btn) {
    addSubTopicDirectly(btn.previousElementSibling);
}

function addSubTopicDirectly(container) {
    const div = document.createElement('div');
    div.className = 'sub-row';
    div.innerHTML = `
        <div class="col-name">
            <input type="text" class="sub-name" placeholder="ชื่อหัวข้อย่อย">
        </div>
        <div class="col-score">
            <input type="number" class="sub-max" placeholder="MAX">
            <input type="number" class="sub-mpl" placeholder="MPL%">
        </div>
        <button class="btn-delete-sub" onclick="removeSubTopic(this)">✕</button>
    `;
    container.appendChild(div);
}

function removeCategory(btn) {
    if(confirm("ลบหมวดนี้ใช่ไหม?")) btn.closest('tr').remove();
}

function removeSubTopic(btn) {
    btn.closest('.sub-row').remove();
}

// ⭐ แก้หลัก ๆ อยู่ตรงนี้
async function saveSetup() {
    const courseName = document.getElementById('courseName').value.trim();
    if(!courseName) return alert("กรุณากรอกชื่อรายวิชา");

    const btn = document.querySelector('.btn-save');
    btn.innerText = "⏳ กำลังบันทึก...";
    btn.disabled = true;

    const criteriaData = [];

    document.querySelectorAll('#criteriaBody tr').forEach(tr => {
        const catName = tr.querySelector('.cat-name').value.trim();
        const weight = Number(tr.querySelector('.cat-weight').value) || 0;

        tr.querySelectorAll('.sub-row').forEach(sub => {
            const subName = sub.querySelector('.sub-name').value.trim();

            // กันค่าว่าง
            if(!subName) return;

            criteriaData.push({
                category: catName,
                weight: weight,
                subName: subName,
                max: Number(sub.querySelector('.sub-max').value) || 0,
                mpl: Number(sub.querySelector('.sub-mpl').value) || 0
            });
        });
    });

    const payload = {
        action: 'saveSetup',
        courseName: courseName,
        courseGroup: document.getElementById('courseGroup').value,
        interval: Number(document.getElementById('interval').value) || 0,
        department: document.getElementById('department').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        teacher: document.getElementById('teacher').value,
        headTeacher: document.getElementById('headTeacher').value,
        headDept: document.getElementById('headDept').value,
        criteria: criteriaData
    };

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Server error");

        const result = await response.json();

        if(result.status === 'success') {
            alert("✅ บันทึกสำเร็จ");
            location.reload();
        } else {
            alert("❌ " + result.message);
        }

    } catch (error) {
        alert("❌ เชื่อมต่อ API ไม่ได้");
    }

    btn.innerText = "💾 บันทึกการตั้งค่า";
    btn.disabled = false;
}

// โหลดรายชื่อวิชา
async function loadCourseList() {
    try {
        const res = await fetch(`${API_URL}?action=getCourses`);
        const courses = await res.json();

        let html = "";
        courses.forEach(c => {
            html += `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${c}</span>
                    <button onclick="deleteCourse('${c}')">ลบ</button>
                </div>`;
        });

        document.getElementById('courseManagementList').innerHTML =
            html || "ยังไม่มีข้อมูล";

    } catch {
        document.getElementById('courseManagementList').innerHTML = "โหลดไม่ได้";
    }
}

async function deleteCourse(name) {
    if(!confirm(`ลบ ${name} ใช่ไหม?`)) return;

    await fetch(API_URL, {
        method: 'POST',
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            action: 'deleteCourse',
            courseName: name
        })
    });

    alert("ลบแล้ว");
    location.reload();
}
</script>
