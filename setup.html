<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyGJZSFcQXxIx4aIxi3rDaQULSE3Tm43tlVHiIyuMep07oK7REfYIAIVc18Fbbo5rRH/exec";

// โหลดหน้า
document.addEventListener("DOMContentLoaded", function() {
    addCategory("MEQ");
    loadCourseList();
});

// เพิ่มหมวด
function addCategory(defaultName) {
    defaultName = defaultName || "";

    var tbody = document.getElementById('criteriaBody');
    var tr = document.createElement('tr');

    tr.innerHTML =
        '<td>' +
            '<input type="text" class="cat-name" value="' + defaultName + '">' +
            '<button class="btn-delete-cat" onclick="removeCategory(this)">ลบ</button>' +
        '</td>' +
        '<td>' +
            '<div class="sub-container"></div>' +
            '<button class="btn-add-sub" onclick="addSubTopic(this)">+ เพิ่ม</button>' +
        '</td>' +
        '<td>' +
            '<input type="number" class="cat-weight">' +
        '</td>';

    tbody.appendChild(tr);
    addSubTopicDirectly(tr.querySelector('.sub-container'));
}

// เพิ่มหัวข้อย่อย
function addSubTopic(btn) {
    addSubTopicDirectly(btn.previousElementSibling);
}

function addSubTopicDirectly(container) {
    var div = document.createElement('div');
    div.className = 'sub-row';

    div.innerHTML =
        '<input type="text" class="sub-name" placeholder="ชื่อ">' +
        '<input type="number" class="sub-max" placeholder="MAX">' +
        '<input type="number" class="sub-mpl" placeholder="MPL">' +
        '<button onclick="removeSubTopic(this)">X</button>';

    container.appendChild(div);
}

// ลบ
function removeCategory(btn) {
    if(confirm("ลบหมวดนี้?")) {
        btn.closest('tr').remove();
    }
}

function removeSubTopic(btn) {
    btn.parentElement.remove();
}

// ⭐ บันทึก
async function saveSetup() {
    var courseName = document.getElementById('courseName').value.trim();
    if(!courseName) {
        alert("กรอกชื่อวิชา");
        return;
    }

    var btn = document.querySelector('.btn-save');
    btn.innerText = "กำลังบันทึก...";
    btn.disabled = true;

    var criteriaData = [];

    document.querySelectorAll('#criteriaBody tr').forEach(function(tr) {
        var catName = tr.querySelector('.cat-name').value.trim();
        var weight = Number(tr.querySelector('.cat-weight').value) || 0;

        tr.querySelectorAll('.sub-row').forEach(function(sub) {
            var subName = sub.querySelector('.sub-name').value.trim();
            if(!subName) return;

            criteriaData.push({
                category: catName,
                weight: weight,
                subName: subName,
                max: Number(sub.querySelector('.sub-max').value) || 0,
                mpl: Number(sub.querySelector('.sub-mpl').value) || 0
            });
        });
    });

    var payload = {
        action: "saveSetup",
        courseName: courseName,
        courseGroup: document.getElementById('courseGroup').value,
        interval: Number(document.getElementById('interval').value) || 0,
        department: document.getElementById('department').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        teacher: document.getElementById('teacher').value,
        headTeacher: document.getElementById('headTeacher').value,
        headDept: document.getElementById('headDept').value,
        criteria: criteriaData
    };

    try {
        var res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if(!res.ok) throw new Error("server error");

        var result = await res.json();

        if(result.status === "success") {
            alert("บันทึกสำเร็จ");
            location.reload();
        } else {
            alert("error: " + result.message);
        }

    } catch(e) {
        alert("เชื่อมต่อ API ไม่ได้");
    }

    btn.innerText = "บันทึก";
    btn.disabled = false;
}

// โหลดรายชื่อวิชา
async function loadCourseList() {
    try {
        var res = await fetch(API_URL + "?action=getCourses");
        var courses = await res.json();

        var html = "";

        courses.forEach(function(c) {
            html += '<div style="display:flex;justify-content:space-between;">' +
                        '<span>' + c + '</span>' +
                        '<button onclick="deleteCourse(\'' + c + '\')">ลบ</button>' +
                    '</div>';
        });

        document.getElementById('courseManagementList').innerHTML =
            html || "ไม่มีข้อมูล";

    } catch(e) {
        document.getElementById('courseManagementList').innerHTML = "โหลดไม่ได้";
    }
}

// ลบวิชา
async function deleteCourse(name) {
    if(!confirm("ลบ " + name + " ใช่ไหม?")) return;

    await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            action: "deleteCourse",
            courseName: name
        })
    });

    alert("ลบแล้ว");
    location.reload();
}
</script>
