<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าตั้งค่ารายวิชา (Admin)</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { border-left: 5px solid #1a73e8; padding-left: 10px; color: #333; margin-top: 30px; }
        
        /* สไตล์ฟอร์ม */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
        }
        
        /* สไตล์ตารางตั้งค่าเกณฑ์ */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; vertical-align: top; }
        th { background: #e3f2fd; text-align: center; font-weight: bold; color: #1565c0; }
        
        /* จัด Layout หัวข้อย่อยให้ตรงกัน */
        .sub-header { display: flex; gap: 10px; padding: 0 5px; }
        .sub-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; background: #fdfdfd; border: 1px dashed #eee; padding: 5px; border-radius: 5px; }
        .col-name { flex: 1.5; }
        .col-score { flex: 1; display: flex; gap: 5px; }
        
        /* ปุ่มต่างๆ */
        .btn-add-cat { background: #1a73e8; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-add-sub { background: #e0e0e0; color: #333; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-delete-cat { background: #ff4d4d; color: white; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; width: 100%; margin-top: 10px; }
        .btn-delete-sub { background: none; color: #ff4d4d; border: none; cursor: pointer; font-size: 18px; padding: 0 5px; }
        .btn-save { background: #28a745; color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0;">📋 ข้อมูลรายวิชา</h2>
    <div class="form-grid">
        <div class="form-group">
            <label>รายวิชา:</label>
            <input type="text" id="courseName" placeholder="เช่น ทฤษฎีทางศัลยศาสตร์ 1">
        </div>
        <div class="form-group">
            <label>กลุ่ม:</label>
            <input type="text" id="courseGroup" placeholder="เช่น 2(4)">
        </div>
    </div>

    <h2>⚙️ ตั้งค่าเกณฑ์การประเมิน</h2>
    <table>
        <thead>
            <tr>
                <th width="22%">หมวดการประเมินหลัก</th>
                <th width="63%">
                    <div class="sub-header">
                        <div class="col-name">หัวข้อย่อย</div>
                        <div class="col-score">รายละเอียด (MAX / MPL%)</div>
                        <div style="width: 25px;"></div>
                    </div>
                </th>
                <th width="15%">% น้ำหนัก</th>
            </tr>
        </thead>
        <tbody id="criteriaBody">
            </tbody>
    </table>
    
    <button class="btn-add-cat" onclick="addCategory()">➕ เพิ่มหมวดการประเมินหลัก</button>

    <h2>📅 ตั้งค่ารายละเอียดอื่นๆ</h2>
    <div class="form-grid">
        <div class="form-group">
            <label>อันตรรภาคชั้น (Interval):</label>
            <input type="number" id="interval" step="0.1" value="3.5">
        </div>
        <div class="form-group">
            <label>กลุ่มงาน:</label>
            <input type="text" id="department" value="ศัลยกรรม">
        </div>
        <div class="form-group">
            <label>วันที่เริ่ม:</label>
            <input type="date" id="startDate">
        </div>
        <div class="form-group">
            <label>วันที่สิ้นสุด:</label>
            <input type="date" id="endDate">
        </div>
    </div>

    <h2>👨‍🏫 รายนามอาจารย์</h2>
    <div class="form-grid">
        <div class="form-group">
            <label>อาจารย์ผู้ประเมิน:</label>
            <input type="text" id="teacher" placeholder="ชื่ออาจารย์">
        </div>
        <div class="form-group">
            <label>อาจารย์รับผิดชอบรายวิชา:</label>
            <input type="text" id="headTeacher" placeholder="ชื่ออาจารย์รับผิดชอบ">
        </div>
        <div class="form-group">
            <label>หัวหน้ากลุ่มงาน:</label>
            <input type="text" id="headDept" placeholder="ชื่อหัวหน้า">
        </div>
    </div>

    <button class="btn-save" onclick="saveSetup()">💾 บันทึกการตั้งค่ารายวิชานี้</button>

</div>

<script>
    // ฟังก์ชันรันตอนเปิดหน้าเว็บ: สร้างหมวดตั้งต้นให้ 1 อัน
    document.addEventListener("DOMContentLoaded", () => {
        addCategory("MEQ");
    });

    // 1. ฟังก์ชันเพิ่ม "หมวดหลัก"
    function addCategory(defaultName = "") {
        const tbody = document.getElementById('criteriaBody');
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
            <td>
                <input type="text" class="cat-name" placeholder="ชื่อหมวด (เช่น MEQ)" value="${defaultName}">
                <button class="btn-delete-cat" onclick="removeCategory(this)">🗑️ ลบหมวดนี้</button>
            </td>
            <td>
                <div class="sub-container"></div>
                <button class="btn-add-sub" onclick="addSubTopic(this)">+ เพิ่มหัวข้อย่อย</button>
            </td>
            <td>
                <input type="number" class="cat-weight" placeholder="น้ำหนัก %">
            </td>
        `;
        
        tbody.appendChild(tr);
        
        // พอสร้างหมวดหลักเสร็จ ให้แถมหัวข้อย่อยให้ 1 ข้ออัตโนมัติ
        const subContainer = tr.querySelector('.sub-container');
        addSubTopicDirectly(subContainer);
    }

    // 2. ฟังก์ชันเพิ่ม "หัวข้อย่อย"
    function addSubTopic(btn) {
        const container = btn.previousElementSibling;
        addSubTopicDirectly(container);
    }

    function addSubTopicDirectly(container) {
        const div = document.createElement('div');
        div.className = 'sub-row';
        div.innerHTML = `
            <div class="col-name">
                <input type="text" class="sub-name" placeholder="ชื่อหัวข้อย่อย (เช่น 1 Gen 1)">
            </div>
            <div class="col-score">
                <input type="number" class="sub-max" placeholder="MAX">
                <input type="number" class="sub-mpl" placeholder="MPL%">
            </div>
            <button class="btn-delete-sub" title="ลบหัวข้อนี้" onclick="removeSubTopic(this)">✕</button>
        `;
        container.appendChild(div);
    }

    // 3. ฟังก์ชันลบ "หมวดหลัก"
    function removeCategory(btn) {
        if(confirm("แน่ใจหรือไม่ว่าต้องการลบหมวดนี้และหัวข้อย่อยทั้งหมด?")) {
            btn.closest('tr').remove();
        }
    }

    // 4. ฟังก์ชันลบ "หัวข้อย่อย"
    function removeSubTopic(btn) {
        btn.closest('.sub-row').remove();
    }

    // 5. ฟังก์ชัน (จำลอง) สำหรับกดบันทึกข้อมูล
    function saveSetup() {
        const btn = document.querySelector('.btn-save');
        btn.innerText = "⏳ กำลังประมวลผล...";
        
        // ตรงนี้เดี๋ยวเราเอาไว้เขียนโค้ดส่งข้อมูลไป Google Sheets ครับ
        setTimeout(() => {
            alert("บันทึกข้อมูลโครงสร้างเรียบร้อยแล้ว!");
            btn.innerText = "💾 บันทึกการตั้งค่ารายวิชานี้";
        }, 1000);
    }
</script>

</body>
</html>
