<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <h2 style="margin: 0; color: #1a73e8;">⚙️ ตั้งค่าระบบและข้อมูลรายวิชา</h2>
    
    <button onclick="loadHistoryAdmin()" style="background: #ff9800; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
        📜 ดูประวัติ / แก้ไขคะแนนนิสิต
    </button>
</div>

<div id="adminHistorySection" style="display:none; margin-bottom: 30px; background: #fff; padding: 20px; border-radius: 12px; border: 2px solid #ff9800;">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin:0; color:#e67e22;">📋 รายการคะแนนที่บันทึกแล้ว (1 คนต่อ 1 แถว)</h3>
        <button onclick="document.getElementById('adminHistorySection').style.display='none'" style="background:#eee; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer;">✕</button>
    </div>
    <div id="adminHistoryContainer" style="overflow-x: auto;">
        </div>
</div>

<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000;">
    <div style="background:white; max-width:550px; margin:30px auto; padding:25px; border-radius:15px; position:relative; max-height: 90vh; overflow-y: auto;">
        <h3 style="color:#1a73e8; margin-top:0; border-bottom:2px solid #eee; padding-bottom:10px;">✏️ แก้ไขข้อมูลทั้งหมด</h3>
        <div id="editFormContent">
            </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeEditModal()" style="flex:1; background:#666; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">ยกเลิก</button>
            <button id="btnSaveEdit" onclick="saveEditAdmin()" style="flex:1; background:#28a745; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">💾 บันทึกการแก้ไข (ทับแถวเดิม)</button>
        </div>
    </div>
</div>

<script>
    // 🚩 อย่าลืมเปลี่ยน URL Web App ของคุณที่นี่
    const ADMIN_API_URL = "https://script.google.com/macros/s/AKfycbyGJZSFcQXxIx4aIxi3rDaQULSE3Tm43tlVHiIyuMep07oK7REfYIAIVc18Fbbo5rRH/exec"; 
    
    let historyDataAdmin = [];
    let currentRowIdAdmin = null;

    async function loadHistoryAdmin() {
        const section = document.getElementById('adminHistorySection');
        const container = document.getElementById('adminHistoryContainer');
        section.style.display = 'block';
        container.innerHTML = "⏳ กำลังดึงข้อมูลจาก Google Sheets...";
        
        try {
            const res = await fetch(`${ADMIN_API_URL}?action=getHistory`);
            historyDataAdmin = await res.json();
            
            if(!historyDataAdmin.length) {
                container.innerHTML = "<p>ไม่พบข้อมูลประวัติ</p>";
                return;
            }

            let html = `<table style="width:100%; border-collapse: collapse; font-size: 14px;">
                <tr style="background:#f1f3f4; text-align:left;">
                    <th style="padding:10px; border:1px solid #ddd;">รหัสนิสิต</th>
                    <th style="padding:10px; border:1px solid #ddd;">ชื่อ-นามสกุล</th>
                    <th style="padding:10px; border:1px solid #ddd;">วิชา</th>
                    <th style="padding:10px; border:1px solid #ddd; text-align:center;">จัดการ</th>
                </tr>`;
            
            historyDataAdmin.forEach(item => {
                let name = item["ชื่อ-สกุล"] || item["ชื่อ-นามสกุล"] || "ไม่ระบุชื่อ";
                html += `<tr>
                    <td style="padding:10px; border:1px solid #ddd;">${item["รหัสนิสิต"]}</td>
                    <td style="padding:10px; border:1px solid #ddd;">${name}</td>
                    <td style="padding:10px; border:1px solid #ddd;">${item["รายวิชา"]}</td>
                    <td style="padding:10px; border:1px solid #ddd; text-align:center;">
                        <button onclick="openEditModal(${item.rowId})" style="background:#4285f4; color:white; border:none; padding:6px 12px; border-radius:5px; cursor:pointer;">🔍 แก้ไขข้อมูล</button>
                    </td>
                </tr>`;
            });
            html += `</table>`;
            container.innerHTML = html;
        } catch(e) { container.innerHTML = "❌ ไม่สามารถโหลดข้อมูลได้"; }
    }

    function openEditModal(rowId) {
        const item = historyDataAdmin.find(d => d.rowId === rowId);
        if(!item) return;
        currentRowIdAdmin = rowId;
        const standardKeys = ["Timestamp", "รายวิชา", "กลุ่ม", "รหัสนิสิต", "ชื่อ-สกุล", "ชื่อ-นามสกุล", "อาจารย์ผู้ประเมิน", "rowId"];
        
        let formHtml = `
            <div style="margin-bottom:12px;"><label>รายวิชา:</label><input type="text" id="edit_course" value="${item['รายวิชา']}" style="width:100%; padding:8px; border:1px solid #ccc;"></div>
            <div style="margin-bottom:12px;"><label>กลุ่ม:</label><input type="text" id="edit_group" value="${item['กลุ่ม']}" style="width:100%; padding:8px; border:1px solid #ccc;"></div>
            <div style="margin-bottom:12px;"><label>รหัสนิสิต:</label><input type="text" id="edit_studentId" value="${item['รหัสนิสิต']}" style="width:100%; padding:8px; border:1px solid #ccc;"></div>
            <div style="margin-bottom:12px;"><label>ชื่อ-นามสกุล:</label><input type="text" id="edit_studentName" value="${item['ชื่อ-สกุล'] || item['ชื่อ-นามสกุล']}" style="width:100%; padding:8px; border:1px solid #ccc;"></div>
            <div style="margin-bottom:12px;"><label>อาจารย์ผู้ประเมิน:</label><input type="text" id="edit_teacher" value="${item['อาจารย์ผู้ประเมิน'] || ''}" style="width:100%; padding:8px; border:1px solid #ccc;"></div>
            <p style="font-weight:bold; color:#e67e22; border-top:1px solid #eee; padding-top:10px;">แก้ไขคะแนนรายข้อ:</p>
        `;

        for(let key in item) {
            if(!standardKeys.includes(key) && item[key] !== "") {
                formHtml += `<div style="margin-bottom:8px;">
                                <label style="font-size:12px;">${key}:</label> 
                                <input type="number" class="admin-score-input" data-topic="${key}" value="${item[key]}" style="width:100%; padding:8px; border:1px solid #ddd;">
                             </div>`;
            }
        }
        document.getElementById('editFormContent').innerHTML = formHtml;
        document.getElementById('editModal').style.display = 'block';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveEditAdmin() {
        const btn = document.getElementById('btnSaveEdit');
        btn.disabled = true; btn.innerText = "⏳ กำลังบันทึกทับข้อมูลเดิม...";
        
        let scores = {};
        document.querySelectorAll('.admin-score-input').forEach(i => {
            scores[i.getAttribute('data-topic')] = i.value;
        });

        const payload = {
            action: 'saveScore', 
            rowId: currentRowIdAdmin, // ส่ง rowId ไปเพื่อให้หลังบ้านรู้ว่าต้องเขียนทับแถวไหน
            course: document.getElementById('edit_course').value,
            group: document.getElementById('edit_group').value,
            studentId: document.getElementById('edit_studentId').value,
            studentName: document.getElementById('edit_studentName').value,
            teacher: document.getElementById('edit_teacher').value,
            scores: scores
        };

        try {
            await fetch(ADMIN_API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("✅ แก้ไขข้อมูลเรียบร้อยแล้ว แถวเดิมถูกปรับปรุงแล้วครับ");
            closeEditModal();
            loadHistoryAdmin();
        } catch(e) { alert("❌ เกิดข้อผิดพลาดในการบันทึก"); }
        btn.disabled = false; btn.innerText = "💾 บันทึกการแก้ไข (ทับแถวเดิม)";
    }
</script>
